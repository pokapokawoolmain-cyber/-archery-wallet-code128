<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会員証をWalletに追加</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  min-height: 100vh;
  color: #0f172a;
  background:
    radial-gradient(circle at top left, rgba(125, 211, 252, 0.34), transparent 34%),
    radial-gradient(circle at bottom right, rgba(147, 197, 253, 0.24), transparent 38%),
    linear-gradient(135deg, #f8fdff 0%, #eef8ff 48%, #f7fcff 100%);
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    repeating-linear-gradient(
      120deg,
      rgba(255,255,255,0.38) 0px,
      rgba(255,255,255,0.38) 2px,
      transparent 2px,
      transparent 28px
    );
  opacity: 0.5;
  pointer-events: none;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.18), transparent 35%, rgba(186,230,253,0.10));
  pointer-events: none;
}

.wrapper {
  width: 100%;
  max-width: 460px;
  margin: 0 auto;
  padding: 48px 18px 40px;
  position: relative;
  z-index: 1;
}

.container {
  position: relative;
  background: rgba(255,255,255,0.44);
  border: 1px solid rgba(255,255,255,0.8);
  border-radius: 28px;
  padding: 34px 22px 26px;
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);
  box-shadow:
    0 22px 60px rgba(56, 189, 248, 0.14),
    0 8px 24px rgba(15, 23, 42, 0.06),
    inset 0 1px 0 rgba(255,255,255,0.86);
  overflow: hidden;
}

.container::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 28px;
  padding: 1px;
  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.95),
    rgba(186,230,253,0.9),
    rgba(255,255,255,0.72)
  );
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}

.container::after {
  content: "";
  position: absolute;
  top: -20%;
  left: -30%;
  width: 80%;
  height: 60%;
  background: radial-gradient(circle, rgba(255,255,255,0.55), transparent 70%);
  transform: rotate(-12deg);
  pointer-events: none;
}

h1 {
  margin: 0 0 26px;
  text-align: center;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: #0f172a;
  text-shadow: 0 1px 0 rgba(255,255,255,0.55);
}

.form-group {
  margin-bottom: 18px;
}

label {
  display: block;
  margin-bottom: 8px;
  font-size: 14px;
  font-weight: 700;
  color: rgba(30, 41, 59, 0.88);
  letter-spacing: 0.01em;
}

input {
  width: 100%;
  height: 54px;
  border: 1px solid rgba(125, 211, 252, 0.38);
  border-radius: 16px;
  padding: 0 16px;
  font-size: 16px;
  outline: none;
  background: rgba(255,255,255,0.68);
  color: #0f172a;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.82),
    0 8px 22px rgba(125,211,252,0.08);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
}

input::placeholder {
  color: #94a3b8;
}

input:focus {
  border-color: rgba(56, 189, 248, 0.72);
  box-shadow:
    0 0 0 4px rgba(125,211,252,0.16),
    0 12px 28px rgba(56,189,248,0.14),
    inset 0 1px 0 rgba(255,255,255,0.88);
  transform: translateY(-1px);
}

button {
  width: 100%;
  height: 56px;
  margin-top: 6px;
  border: 1px solid rgba(255,255,255,0.78);
  border-radius: 18px;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.96), rgba(186,230,253,0.96));
  color: #0f172a;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
  box-shadow:
    0 14px 34px rgba(56,189,248,0.18),
    inset 0 1px 0 rgba(255,255,255,0.94);
  letter-spacing: 0.01em;
}

button:hover {
  transform: translateY(-1px);
  filter: brightness(1.02);
  box-shadow:
    0 18px 40px rgba(56,189,248,0.22),
    inset 0 1px 0 rgba(255,255,255,0.98);
}

button:active {
  transform: scale(0.992);
}

button:disabled {
  opacity: 0.72;
  cursor: not-allowed;
  box-shadow: none;
}

#loading {
  text-align: center;
  margin-top: 14px;
  font-size: 13px;
  color: rgba(30, 41, 59, 0.62);
}

.footer-note {
  margin-top: 20px;
  font-size: 12px;
  line-height: 1.7;
  text-align: center;
  color: rgba(30, 41, 59, 0.56);
}

@media (max-width: 480px) {
  .wrapper {
    padding: 34px 14px 28px;
  }

  .container {
    padding: 28px 18px 22px;
    border-radius: 24px;
  }

  h1 {
    font-size: 18px;
    margin-bottom: 22px;
  }

  input {
    height: 52px;
    font-size: 16px;
  }

  button {
    height: 54px;
  }
}
</style>
</head>

<body>
  <div class="wrapper">
    <div class="container">
      <h1>会員証をWalletに追加</h1>

      <form id="issueForm" action="/generate" method="GET">
        <div class="form-group">
          <label for="name">名前</label>
          <input id="name" type="text" name="name" required>
        </div>

        <div class="form-group">
          <label for="memberNumber">会員番号（7桁）</label>
          <input id="memberNumber" type="text" name="memberNumber" inputmode="numeric" required>
        </div>

        <div class="form-group">
          <label for="affiliation">所属</label>
          <input id="affiliation" type="text" name="affiliation" required>
        </div>

        <input type="hidden" id="requestId" name="requestId">

        <button id="submitBtn" type="submit">Walletに追加する</button>
      </form>

      <div id="loading" style="display:none;">
        発行中です…
      </div>

      <div class="footer-note">
        ※本サービスは非公式です。使用可否については各運営の指示に従ってください。
      </div>
    </div>
  </div>

<script>
const form = document.getElementById("issueForm");
const loading = document.getElementById("loading");
const submitBtn = document.getElementById("submitBtn");
const requestIdInput = document.getElementById("requestId");

requestIdInput.value =
  Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 10);

let isSubmitting = false;

form.addEventListener("submit", (e) => {
  if (isSubmitting) {
    e.preventDefault();
    return;
  }

  isSubmitting = true;
  loading.style.display = "block";
  submitBtn.disabled = true;
  submitBtn.textContent = "発行中...";
});
</script>
</body>
</html>
