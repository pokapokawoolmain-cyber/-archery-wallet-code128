<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会員証をWalletに追加</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  background:
    radial-gradient(circle at top, rgba(59,130,246,0.12), transparent 35%),
    linear-gradient(180deg, #081226 0%, #0f172a 100%);
  color: #ffffff;
  min-height: 100vh;
}

.wrapper {
  width: 100%;
  max-width: 460px;
  margin: 0 auto;
  padding: 48px 18px 40px;
}

.container {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 24px;
  padding: 34px 22px 26px;
  backdrop-filter: blur(18px);
  box-shadow: 0 18px 40px rgba(0,0,0,0.28);
}

h1 {
  margin: 0 0 26px;
  text-align: center;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.form-group {
  margin-bottom: 18px;
}

label {
  display: block;
  margin-bottom: 8px;
  font-size: 14px;
  font-weight: 600;
  color: rgba(255,255,255,0.92);
}

input {
  width: 100%;
  height: 54px;
  border: none;
  border-radius: 14px;
  padding: 0 16px;
  font-size: 16px;
  outline: none;
  background: rgba(255,255,255,0.96);
  color: #0f172a;
  box-shadow: inset 0 0 0 1px rgba(15,23,42,0.06);
}

input::placeholder {
  color: #94a3b8;
}

button {
  width: 100%;
  height: 56px;
  margin-top: 6px;
  border: none;
  border-radius: 16px;
  background: linear-gradient(180deg, #4f8df7 0%, #3b82f6 100%);
  color: #ffffff;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s ease, opacity 0.15s ease;
  box-shadow: 0 10px 24px rgba(59,130,246,0.28);
}

button:active {
  transform: scale(0.99);
}

button:disabled {
  opacity: 0.7;
  cursor: not-allowed;
  box-shadow: none;
}

.secondary-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 52px;
  margin-top: 10px;
  border: none;
  border-radius: 14px;
  background: rgba(255,255,255,0.1);
  color: #ffffff;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}

#loading {
  text-align: center;
  margin-top: 14px;
  font-size: 13px;
  color: rgba(255,255,255,0.72);
}

.footer-note {
  margin-top: 20px;
  font-size: 12px;
  line-height: 1.6;
  text-align: center;
  color: rgba(255,255,255,0.58);
}

.thank-you {
  text-align: center;
  padding: 18px 6px 8px;
}

.thank-you h1 {
  margin-bottom: 14px;
}

.thank-you p {
  margin: 0 0 16px;
  color: rgba(255,255,255,0.82);
  line-height: 1.6;
}

@media (max-width: 480px) {
  .wrapper {
    padding: 34px 14px 28px;
  }

  .container {
    padding: 28px 18px 22px;
    border-radius: 20px;
  }

  h1 {
    font-size: 18px;
    margin-bottom: 22px;
  }

  input {
    height: 52px;
    font-size: 16px;
  }

  button {
    height: 54px;
  }
}
</style>
</head>

<body>
  <div class="wrapper">
    <div class="container" id="mainContainer">
      <h1>会員証をWalletに追加</h1>

      <form id="issueForm" action="/generate" method="GET">
        <div class="form-group">
          <label for="name">名前</label>
          <input id="name" type="text" name="name" required>
        </div>

        <div class="form-group">
          <label for="memberNumber">会員番号（7桁）</label>
          <input id="memberNumber" type="text" name="memberNumber" inputmode="numeric" required>
        </div>

        <div class="form-group">
          <label for="affiliation">所属</label>
          <input id="affiliation" type="text" name="affiliation" required>
        </div>

        <input type="hidden" id="requestId" name="requestId">

        <button id="submitBtn" type="submit">Walletに追加する</button>
      </form>

      <div id="loading" style="display:none;">
        発行中です…
      </div>

      <div class="footer-note">
        ※本サービスは非公式です。使用可否については各運営の指示に従ってください。
      </div>
    </div>
  </div>

<script>
const form = document.getElementById("issueForm");
const loading = document.getElementById("loading");
const submitBtn = document.getElementById("submitBtn");
const requestIdInput = document.getElementById("requestId");
const container = document.getElementById("mainContainer");

requestIdInput.value =
  Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 10);

let isSubmitting = false;

form.addEventListener("submit", (e) => {
  e.preventDefault();

  if (isSubmitting) {
    return;
  }

  isSubmitting = true;
  loading.style.display = "block";
  submitBtn.disabled = true;
  submitBtn.textContent = "発行中...";

  const params = new URLSearchParams(new FormData(form)).toString();
  const url = "/generate?" + params;

  window.open(url, "_blank");

  setTimeout(() => {
    container.innerHTML = `
      <div class="thank-you">
        <h1>Thank you for using it！</h1>
        <p>会員証の発行が完了しました。</p>
        <p>URLを共有して友達におすすめしよう</p>
        <button class="secondary-button" onclick="copyShareUrl()">URLをコピー</button>
        <div class="footer-note" style="margin-top:18px;">
          ※本サービスは非公式です。使用可否については各運営の指示に従ってください。
        </div>
      </div>
    `;
  }, 500);
});

function copyShareUrl() {
  const shareUrl = window.location.origin;
  navigator.clipboard.writeText(shareUrl).then(() => {
    alert("URLをコピーしました！");
  }).catch(() => {
    alert("URLのコピーに失敗しました。");
  });
}
</script>
</body>
</html>
