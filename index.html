<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>会員登録</title>
</head>
<body>
  <h2>会員登録フォーム</h2>

  <form id="issueForm" action="/generate" method="GET">
    <label>名前</label><br>
    <input type="text" name="name" required><br><br>

    <label>会員番号</label><br>
    <input type="text" name="memberNumber" required><br><br>

    <label>所属</label><br>
    <input type="text" name="affiliation" required><br><br>

    <input type="hidden" id="requestId" name="requestId">

    <button id="submitBtn" type="submit">発行する</button>
  </form>

  <p id="loading" style="display:none; margin-top:16px;">
    発行中です。しばらくお待ちください...
  </p>

  <script>
    const form = document.getElementById("issueForm");
    const loading = document.getElementById("loading");
    const submitBtn = document.getElementById("submitBtn");
    const requestIdInput = document.getElementById("requestId");

    // ページ表示時に1回だけ requestId を生成
    requestIdInput.value =
      Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 10);

    let isSubmitting = false;

    form.addEventListener("submit", (event) => {
      if (isSubmitting) {
        event.preventDefault();
        return;
      }

      isSubmitting = true;
      loading.style.display = "block";
      submitBtn.disabled = true;
      submitBtn.textContent = "発行中...";
    });
  </script>
</body>
</html>
